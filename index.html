<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vědci zjistili</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1VKMTJ7HFT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-1VKMTJ7HFT');
    </script>
    
    <!-- Styly -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config a Database -->
    <script src="config.js"></script>
    <script src="database.js"></script>
    <script src="newsletter-generator.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="site-title">Vědci zjistili</a>
            <nav>
                <a href="index.html">Články</a>
                <a href="archiv.html">Archiv</a>
                <a href="about.html">O projektu</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <!-- Hlavní článek s velkým obrázkem -->
        <div id="featured-article-container" class="loading">
            Načítání nejnovějšího článku...
        </div>
        
        <!-- Glosa -->
        <div id="glosa-container">
            <!-- Dynamicky generováno -->
        </div>
        
        <!-- Další 2 články s náhledy -->
        <section id="articles-with-images" class="articles-with-images">
            <!-- Dynamicky generováno -->
        </section>
        
        <!-- Zbylé články jako jednoduchý seznam -->
        <section class="articles-list">
            <h2 class="section-title">Další články</h2>
            <div id="simple-articles-list" class="loading">
                Načítání článků...
            </div>
        </section>
        
        <!-- Newsletter -->
        <div class="newsletter-section" id="newsletter-signup">
            <h3>Odebírejte newsletter</h3>
            <p>Chcete, aby vám žádná studie neunikla? Pošleme vám anonci. Žádný spam, jen věda.</p>
            <form class="newsletter-form" id="newsletter-form">
                <input type="email" id="newsletter-email" placeholder="váš@email.cz" required>
                <button type="submit">Přihlásit</button>
            </form>
            <div id="newsletter-message" class="newsletter-message" style="display: none;"></div>
        </div>
        
        <!-- Archiv -->
        <div class="archive-link">
            <a href="archiv.html">Zobrazit všechny články →</a>
        </div>
    </main>
    
    <footer>
        <div class="footer-content">
            <p>&copy; 2025 Vědci zjistili. Projekt Miloše Čermáka.</p>
        </div>
    </footer>
    
    <script src="homepage.js"></script>
</body>
</html>
